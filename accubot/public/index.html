function getTimeAwareSuggestions(){
  const h=hr();
  if(h<10) return["Which rooms are free this morning?","What's for lunch today?","What events are on this week?","Who are the new starters?"];
  if(h<12) return["Any free rooms for 4+ people?","What's for lunch today?","What's on this afternoon?","How do I book a meeting room?"];

function buildCalUrl(room,start,endTime,date){
  const d=date||now().toISOString().slice(0,10);
  const s=`${d.replace(/-/g,"")}T${start.replace(":","")  }00`;
  const e=`${d.replace(/-/g,"")}T${endTime.replace(":","") }00`;
  const p=new URLSearchParams({action:"TEMPLATE",text:`Meeting in ${room.name}`,dates:`${s}/${e}`,add:room.calId});
  return `https://calendar.google.com/calendar/render?${p}`;
}

// ── WEATHER (Open-Meteo — free, no API key) ───────────────────────
async function fetchWeather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.5248&longitude=-0.0793&current=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FLondon&forecast_days=1");
    if(!r.ok) throw new Error();
    const d=await r.json();
    const code=d.current.weathercode;
    return{temp:Math.round(d.current.temperature_2m),max:Math.round(d.daily.temperature_2m_max[0]),min:Math.round(d.daily.temperature_2m_min[0]),wind:Math.round(d.current.windspeed_10m),emoji:wxEmoji(code),desc:wxDesc(code),live:true};
  }catch(e){return{temp:9,max:14,min:6,wind:18,emoji:"⛅",desc:"Partly cloudy",live:false};}
}
const wxEmoji=c=>c===0?"☀️":c<=2?"🌤️":c<=3?"☁️":c<=48?"🌫️":c<=67?"🌧️":c<=77?"❄️":c<=82?"🌦️":"⛈️";
const wxDesc =c=>c===0?"Clear sky":c<=2?"Partly cloudy":c<=3?"Overcast":c<=48?"Foggy":c<=57?"Drizzle":c<=67?"Rainy":c<=77?"Snow":c<=82?"Showers":"Thunderstorm";

// ── TFL (free, no API key) ────────────────────────────────────────
async function fetchTfl(){
  try{
    const ids=TFL_LINES.map(l=>l.id).join(",");
    const r=await fetch(`https://api.tfl.gov.uk/Line/${ids}/Status`);
    if(!r.ok) throw new Error();
    const data=await r.json();
    return data.map(line=>({id:line.id,name:line.name,status:line.lineStatuses?.[0]?.statusSeverityDescription||"Unknown",good:(line.lineStatuses?.[0]?.statusSeverityDescription||"")==="Good Service"}));
  }catch(e){return TFL_LINES.map(l=>({...l,status:"Unknown",good:true}));}
}

// ── CLAUDE API — routed through Netlify Function (key stays server-side)
async function callClaude(messages,system){
  const r=await fetch(API.CLAUDE,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages,system,max_tokens:1000}),
  });
  if(!r.ok) throw new Error(`Claude API ${r.status}`);
  const d=await r.json();
  return d.content?.[0]?.text||"Sorry, something went wrong — please try again!";
}

// ── LIVE DATA HOOK ────────────────────────────────────────────────
function useLiveData(){
  const [calEvents,   setCalEvents]   = useState([]);
  const [calLoaded,   setCalLoaded]   = useState(false);
  const [rooms,       setRooms]       = useState(STATIC.rooms);
  const [roomsLive,   setRoomsLive]   = useState(false);
  const [menu,        setMenu]        = useState({items:STATIC.menu,live:false});
  const [weather,     setWeather]     = useState(null);
  const [tfl,         setTfl]         = useState([]);
  const [lastUpdated, setLastUpdated] = useState(null);

  const fetchAll=useCallback(async(isManual=false)=>{
    // 1. Weather + TfL + Lunch + Rooms all in parallel
    const [wx,tflData,lunchData,roomsData]=await Promise.all([
      fetchWeather(), fetchTfl(), fetchLunchMenu(), fetchRooms()
    ]);
    setWeather(wx);
    setTfl(tflData);
    setMenu(lunchData);
    if(roomsData){ setRooms(roomsData); setRoomsLive(true); }

    // 2. Google Calendar events via Netlify Function → Claude MCP
    try{
      const r=await fetch(API.CLAUDE,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          max_tokens:800,
          system:`Return ONLY valid JSON, no markdown. Current time: ${new Date().toISOString()}.
Format: {"events":[{"title":"string","date":"like 'Fri 17 Apr'","time":"like '14:00'","cat":"Company|Social|Learning|External"}]}
Return {"events":[]} if no access.`,
          messages:[{role:"user",content:"List upcoming Accurx company events from Google Calendar for the next 30 days. JSON only."}],
          mcp_servers:[{type:"url",url:"https://calendarmcp.googleapis.com/mcp/v1",name:"google-calendar"}],
        }),
      });
      const d=await r.json();
      const text=(d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      try{const p=JSON.parse(text);if(p.events?.length){setCalEvents(p.events);setCalLoaded(true);}}catch(e){}
    }catch(e){}
    setLastUpdated(new Date());
  },[]);

  useEffect(()=>{
    fetchAll();
    const iv=setInterval(fetchAll,REFRESH_SECONDS*1000);
    const onVisible=()=>{ if(!document.hidden) fetchAll(); };
    document.addEventListener("visibilitychange",onVisible);
    return()=>{ clearInterval(iv); document.removeEventListener("visibilitychange",onVisible); };
  },[fetchAll]);

  return{calEvents,calLoaded,rooms,roomsLive,menu,weather,tfl,lastUpdated,refetch:fetchAll};
}

// ── MARKDOWN RENDERER ─────────────────────────────────────────────
function inl(text){
  const parts=[];let i=0;
  const re=/(\*\*(.+?)\*\*)|(\[(.+?)\]\((.+?)\))|(`(.+?)`)/g;let m;
  while((m=re.exec(text))!==null){
    if(m.index>i)parts.push(text.slice(i,m.index));
    if(m[1])parts.push(<strong key={m.index} style={{color:TXT,fontWeight:700}}>{m[2]}</strong>);
    else if(m[3])parts.push(<a key={m.index} href={m[5]} target="_blank" rel="noopener" style={{color:PINE,fontWeight:600,textDecoration:"underline"}}>{m[4]}</a>);
    else if(m[6])parts.push(<code key={m.index} style={{background:BG,borderRadius:4,padding:"1px 5px",fontSize:12,fontFamily:"monospace"}}>{m[7]}</code>);
    i=m.index+m[0].length;
  }
  if(i<text.length)parts.push(text.slice(i));
  return parts.length?parts:text;
}
function renderMd(text){
  const lines=text.split("\n");const els=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(!line.trim()){i++;continue;}
    if(line.startsWith("## ")){els.push(<div key={i} style={{fontSize:15,fontWeight:700,color:TXT,margin:"12px 0 5px",borderBottom:`1px solid ${BDR}`,paddingBottom:4}}>{inl(line.slice(3))}</div>);i++;continue;}
    if(line.startsWith("# ")) {els.push(<div key={i} style={{fontSize:16,fontWeight:700,color:TXT,margin:"12px 0 5px"}}>{inl(line.slice(2))}</div>);i++;continue;}
    if(line.match(/^[-*]\s/)){
      const items=[];
      while(i<lines.length&&lines[i].match(/^[-*]\s/)){
        items.push(<div key={i} style={{display:"flex",gap:9,marginBottom:4,alignItems:"flex-start"}}>
          <span style={{color:PINE,fontWeight:700,flexShrink:0,marginTop:1}}>·</span>
          <span style={{flex:1,lineHeight:1.65}}>{inl(lines[i].replace(/^[-*]\s/,""))}</span>
        </div>);i++;
      }
      els.push(<div key={"ul"+i} style={{margin:"6px 0"}}>{items}</div>);continue;
    }
    els.push(<p key={i} style={{lineHeight:1.7,marginBottom:5}}>{inl(line)}</p>);i++;
  }
  return els;
}

// ── BOOKING MODAL ─────────────────────────────────────────────────
function BookingModal({room,onClose}){
  const todayStr=now().toISOString().slice(0,10);
  const [date,setDate]=useState(todayStr);
  const [start,setStart]=useState(()=>{
    const h=hr(),m=now().getMinutes();
    return m<30?`${padT(h)}:30`:`${padT(h+1)}:00`;
  });
  const [duration,setDuration]=useState(30);
  const endTime=useMemo(()=>{
    const[h,m]=start.split(":").map(Number);
    const tot=h*60+m+duration;
    return`${padT(Math.floor(tot/60)%24)}:${padT(tot%60)}`;
  },[start,duration]);

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:TXT,marginBottom:4}}>{room.name}</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,color:TXTM}}>{room.floor} floor · {room.seats} seats</span>
              <span style={{fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:99,background:room.free?"#F0FAF5":"#FFF5F5",color:room.free?GREEN:CORAL}}>
                {room.free?"Free now":`Busy until ${room.until}`}
              </span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:TXTL,lineHeight:1}}>×</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:TXTM,marginBottom:6}}>Date</div>
          <input type="date" value={date} min={todayStr} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:TXTM,marginBottom:6}}>Start</div>
            <input type="time" value={start} onChange={e=>setStart(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:TXTM,marginBottom:6}}>End (calculated)</div>
            <input type="time" value={endTime} readOnly style={{background:BG,color:TXTM}}/>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:600,color:TXTM,marginBottom:6}}>Duration</div>
          <div className="seg">
            {[30,60,90,120].map(d=>(
              <button key={d} className={`seg-btn${duration===d?" on":""}`} onClick={()=>setDuration(d)}>
                {d<60?`${d}m`:`${d/60}h`}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:"#F0FAF5",borderRadius:10,padding:"11px 14px",fontSize:13,color:PINE,marginBottom:18,lineHeight:1.5}}>
          📅 Opens Google Calendar with <strong>{room.name}</strong> pre-selected. Add a title and invite attendees.
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={()=>{window.open(buildCalUrl(room,start,endTime,date),"_blank");onClose();}}>
            Open in Google Calendar →
          </button>
        </div>
      </div>
    </div>
  );
}

function AskTab({rooms,calEvents,menu,weather,tfl}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I'm ACCUBOT 👋 Your Accurx HQ guide. Ask me anything — rooms, lunch, events, policies, or office info."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  const suggestions=useMemo(()=>getTimeAwareSuggestions(),[]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const send=useCallback(async(text)=>{
    const q=(text||input).trim();
    if(!q||loading)return;
    setInput("");
    const newMsgs=[...msgs,{role:"user",content:q}];
    setMsgs([...newMsgs,{role:"assistant",content:""}]);
    setLoading(true);
    try{
      const sys=getSystemPrompt(rooms,calEvents,menu,weather,tfl);
      const reply=await callClaude(newMsgs.map(m=>({role:m.role,content:m.content})),sys);
      setMsgs([...newMsgs,{role:"assistant",content:reply}]);
    }catch(e){
      setMsgs([...newMsgs,{role:"assistant",content:"Something went wrong — please try again!"}]);
    }
    setLoading(false);
  },[input,loading,msgs,rooms,calEvents,menu,weather,tfl]);

  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  const h=hr();

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#fff",borderRadius:16,border:`1px solid ${BDR}`,overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${PINE},${BLUE})`,padding:"18px 22px",display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
        <div style={{width:42,height:42,borderRadius:11,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,color:"#fff"}}>✦</div>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Ask ACCUBOT</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.65)",marginTop:1}}>Powered by Claude · rooms, lunch, events, policies & more</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.15)",borderRadius:99,padding:"5px 13px"}}>
          <div className={loading?"ld":""} style={{width:6,height:6,borderRadius:"50%",background:loading?"#FFD700":"#5ee8a8"}}/>
          <span style={{fontSize:11.5,color:"rgba(255,255,255,.85)",fontWeight:600}}>{loading?"Thinking…":"Online"}</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 20px 0"}}>
        {msgs.map((m,i)=><Bubble key={i} msg={m} isStreaming={loading&&i===msgs.length-1&&m.role==="assistant"}/>)}
        {msgs.length===1&&(
          <div style={{marginBottom:20,paddingLeft:40}}>
            <div style={{fontSize:10.5,color:TXTL,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>
              {h<12?"Good morning":"Good afternoon"} — try asking…
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {suggestions.map(s=><button key={s} className="chip" onClick={()=>send(s)}>{s}</button>)}

      </div>
      <div style={{padding:"14px 20px",flexShrink:0,borderTop:`1px solid ${BDR}`}}>

            value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
            style={{maxHeight:100,overflowY:"auto"}} disabled={loading}/>
          <button onClick={()=>send()} disabled={!input.trim()||loading}
            style={{width:36,height:36,borderRadius:9,border:"none",cursor:!input.trim()||loading?"not-allowed":"pointer",
              background:!input.trim()||loading?BDR:`linear-gradient(135deg,${PINE},${BLUE})`,

            {loading?<div className="sp" style={{width:15,height:15,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%"}}/>:"↑"}
          </button>
        </div>
      </div>
    </div>
  );
}

    </div>
  );
}

// ── REFRESH BUTTON — shows spinner while fetching ────────────────
function RefreshButton({refetch}){
  const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(busy)return;
    setBusy(true);
    await refetch(true);
    setBusy(false);
  };
  return(
    <button onClick={go} disabled={busy}
      style={{display:"flex",alignItems:"center",gap:5,background:BG,border:`1px solid ${BDR}`,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,color:busy?PINE:TXTM,cursor:busy?"default":"pointer",fontFamily:FONT,transition:"all .15s",opacity:busy?.7:1}}
      onMouseEnter={e=>{if(!busy){e.currentTarget.style.borderColor=PINE;e.currentTarget.style.color=PINE;}}}
      onMouseLeave={e=>{if(!busy){e.currentTarget.style.borderColor=BDR;e.currentTarget.style.color=TXTM;}}}>
      {busy
        ?<><div className="sp" style={{width:11,height:11,border:"2px solid #E4E8EC",borderTopColor:PINE,borderRadius:"50%"}}/> Refreshing…</>
        :"↻ Refresh"}
    </button>
  );
}

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("overview");
  const [bookingRoom,setBookingRoom]=useState(null);
  const [notif,setNotif]=useState(false);
  const {calEvents,calLoaded,rooms,roomsLive,menu,weather,tfl,lastUpdated,refetch}=useLiveData();

  const titles={overview:"Overview",rooms:"Meeting Rooms",events:"Events",lunch:"Today's Lunch",people:"People",onboarding:"New Joiner Guide",links:"Quick Links",ask:"Ask ACCUBOT"};

  const renderTab=()=>{
    switch(tab){
      case"overview":   return<OverviewTab rooms={rooms} calEvents={calEvents} calLoaded={calLoaded} menu={menu} roomsLive={roomsLive} onBook={setBookingRoom} setTab={setTab}/>;
      case"rooms":      return<RoomsTab rooms={rooms} roomsLive={roomsLive} onBook={setBookingRoom}/>;
      case"events":     return<EventsCard events={calEvents} calLoaded={calLoaded}/>;
      case"lunch":      return<LunchCard menu={menu}/>;
      case"people":     return<PeopleCard/>;
      case"onboarding": return<OnboardingTab/>;
      case"links":      return<QuickLinksCard/>;
      case"ask":        return<AskTab rooms={rooms} calEvents={calEvents} menu={menu} weather={weather} tfl={tfl}/>;
      default:       return null;
    }
  };

  return(
    <>
      <style>{STYLE}</style>
      {bookingRoom&&<BookingModal room={bookingRoom} onClose={()=>setBookingRoom(null)}/>}
      <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:FONT}}>
        <Sidebar active={tab} setActive={setTab} lastUpdated={lastUpdated} calLoaded={calLoaded} roomsLive={roomsLive} lunchLive={menu?.live}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{background:"#fff",borderBottom:`1px solid ${BDR}`,padding:"0 22px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              {tab==="ask"&&<div style={{width:27,height:27,borderRadius:7,background:`linear-gradient(135deg,${PINE},${BLUE})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>✦</div>}
              <span style={{fontSize:17,fontWeight:700,color:TXT}}>{titles[tab]}</span>
              {tab==="ask"&&<span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:"#E6F5F5",color:PINE}}>Powered by Claude</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <RefreshButton refetch={refetch}/>
              {tab!=="ask"&&(
                <button onClick={()=>setTab("ask")} style={{display:"flex",alignItems:"center",gap:6,background:`linear-gradient(135deg,${PINE}15,${BLUE}10)`,border:`1px solid ${PINE}30`,borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,color:PINE,cursor:"pointer",fontFamily:FONT}}>
                  ✦ Ask ACCUBOT
                </button>
              )}
              <div style={{position:"relative"}}>
                <div onClick={()=>setNotif(o=>!o)} style={{width:34,height:34,borderRadius:8,background:notif?"#E6F5F5":BG,border:`1px solid ${notif?PINE:BDR}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer",position:"relative",transition:"all .15s"}}>
                  🔔<div style={{position:"absolute",top:7,right:7,width:6,height:6,borderRadius:"50%",background:CORAL,border:"2px solid #fff"}}/>
                </div>
                {notif&&(
                  <div className="slide-in" style={{position:"absolute",top:42,right:0,width:305,background:"#fff",border:`1px solid ${BDR}`,borderRadius:13,boxShadow:"0 8px 36px rgba(0,0,0,.13)",zIndex:100,overflow:"hidden"}}>
                    <div style={{padding:"12px 15px",borderBottom:`1px solid ${BDR}`,fontSize:13.5,fontWeight:700,color:TXT}}>Announcements</div>
                    {STATIC.announcements.map((a,i)=>(
                      <div key={i} style={{padding:"11px 15px",borderBottom:i<STATIC.announcements.length-1?`1px solid ${BDR}`:"none",fontSize:12.5,color:TXTM,lineHeight:1.6}}>{a}</div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
          <WeatherTflBar weather={weather} tfl={tfl}/>
          <Ticker announcements={STATIC.announcements}/>
          <div style={{flex:1,overflowY:tab==="ask"?"hidden":"auto",padding:tab==="ask"?"16px 22px":"20px 22px",display:tab==="ask"?"flex":"block",flexDirection:"column"}}
            onClick={()=>notif&&setNotif(false)}>
            {renderTab()}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
